[registries.crates-io]
protocol = "sparse"

[build]
# target = "x86_64-unknown-linux-gnu"
# target = "aarch64-linux-android"
# target = "aarch64-apple-ios"
# target = "x86_64-pc-windows-msvc"
# target = "x86_64-apple-darwin"

[target.'cfg(target_arch = "mips")']
linker = "mips-linux-gnu-gcc"

[target.aarch64-apple-ios]
rustflags = [
    "-C",
    "link-arg=-target",
    "-C",
    "link-arg=arm64-apple-ios12.0.0",
    "-C",
    "link-arg=-Wl,-flat_namespace",
    "-C",
    "link-arg=-Wl,-undefined,dynamic_lookup",
]

[target.aarch64-apple-ios-sim]
rustflags = [
    "-C",
    "link-arg=-target",
    "-C",
    "link-arg=arm64-apple-ios12.0.0-simulator",
    "-C",
    "link-arg=-Wl,-flat_namespace",
    "-C",
    "link-arg=-Wl,-undefined,dynamic_lookup",
]

[target.x86_64-apple-ios]
rustflags = [
    "-C",
    "link-arg=-target",
    "-C",
    "link-arg=x86_64-apple-ios12.0.0-simulator",
    "-C",
    "link-arg=-Wl,-flat_namespace",
    "-C",
    "link-arg=-Wl,-undefined,dynamic_lookup",
]
